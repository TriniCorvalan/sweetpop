<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carrito - SweetPop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top py-3">
      <div class="container">
        <a class="navbar-brand logo d-flex align-items-center gap-2" href="index.html">
          <img src="img/logo.png" alt="Logo SweetPop" width="40" height="40" class="rounded">
          SweetPop
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Abrir menú">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto" id="mainNavItems"></ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container py-4">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Inicio</a></li>
        <li class="breadcrumb-item active" aria-current="page">Carrito</li>
      </ol>
    </nav>

    <section class="sweetpop-admin-card p-4 p-md-5">
      <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
        <div>
          <h1 class="h2 mb-2">Carrito de compras</h1>
          <p class="mb-0">Revisa tus cajas personalizadas antes de pagar.</p>
        </div>
        <a href="boxes.html" class="btn btn-outline-light btn-sm">Personalizar otra caja</a>
      </div>

      <div role="alert" id="cartAlert"></div>
      <div id="cartContent"></div>
    </section>
  </main>

  <footer class="site-footer py-4 mt-auto">
    <div class="container text-center">
      <p class="mb-2">SweetPop - Sorpresas dulces</p>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
